<!-- Backdrop -->
<div class="fixed inset-0 bg-black/60 z-40" (click)="close()"></div>

<!-- Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-gray-900 border-t border-gray-700 rounded-t-2xl p-5 space-y-4">
  <div class="flex items-center justify-between">
    <h3 class="font-semibold text-white">Add Note</h3>
    <button (click)="close()" class="text-gray-400 hover:text-white text-xl leading-none">✕</button>
  </div>

  <p class="text-xs text-gray-400 uppercase tracking-wide">{{ fieldLabel() }}</p>
  <p class="text-xs text-gray-500">Submitting as <span class="text-gray-300">{{ authorName }}</span></p>

  <div>
    <label class="block text-sm text-gray-300 mb-1">Correction / Note</label>
    <textarea
      [ngModel]="correction()"
      (ngModelChange)="correction.set($event)"
      placeholder="What's different in practice?"
      rows="3"
      class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 resize-none">
    </textarea>
  </div>

  <button
    (click)="save()"
    [disabled]="saving() || !correction().trim()"
    class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white font-medium py-2.5 rounded-lg transition-colors">
    {{ saving() ? 'Saving...' : 'Save Note' }}
  </button>
</div>
