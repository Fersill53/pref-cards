<div class="bg-gray-950 text-white">

  <header class="sticky top-0 z-10 bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between">
    <button (click)="goBack()" class="text-gray-400 hover:text-white text-sm transition-colors">
      Cancel
    </button>
    <h1 class="text-base font-semibold">{{ isEdit() ? 'Edit Set' : 'New Set' }}</h1>
    <button
      (click)="save()"
      [disabled]="saving() || !set().name.trim()"
      class="text-sm font-medium text-emerald-400 hover:text-emerald-300 disabled:opacity-40 transition-colors">
      {{ saving() ? 'Saving…' : 'Save' }}
    </button>
  </header>

  <main class="px-4 py-4 max-w-2xl mx-auto space-y-4">

    <!-- Name -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Set Info</h2>
      <div>
        <label class="text-xs text-gray-500 block mb-1">Set Name</label>
        <input
          type="text"
          [value]="set().name"
          (input)="updateName($any($event.target).value)"
          placeholder="e.g. Basic Laparotomy Set"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-600" />
      </div>
      <div>
        <label class="text-xs text-gray-500 block mb-1">Specialty</label>
        <p class="text-sm text-gray-300">{{ specialtyName() }}</p>
      </div>
    </section>

    <!-- Instruments -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Instruments</h2>
        <button (click)="addInstrument()"
          class="text-xs text-emerald-400 hover:text-emerald-300 border border-emerald-800 hover:border-emerald-600 px-3 py-1 rounded-lg transition-colors">
          + Add
        </button>
      </div>

      @if (set().instruments.length === 0) {
        <p class="text-sm text-gray-600 text-center py-4">No instruments yet. Tap + Add to begin.</p>
      }

      @for (item of set().instruments; track $index) {
        <div class="bg-gray-800 rounded-xl p-3 space-y-2">
          <div class="flex items-center gap-2">
            <input
              type="text"
              [value]="item.name"
              (input)="updateInstrument($index, 'name', $any($event.target).value)"
              placeholder="Instrument name"
              class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-emerald-600" />
            <div class="flex items-center gap-1">
              <span class="text-xs text-gray-500">×</span>
              <input
                type="number"
                [value]="item.quantity"
                (input)="updateInstrument($index, 'quantity', +$any($event.target).value)"
                min="1"
                class="w-14 bg-gray-700 border border-gray-600 rounded-lg px-2 py-2 text-sm text-white text-center focus:outline-none focus:border-emerald-600" />
            </div>
            <button (click)="removeInstrument($index)"
              class="text-gray-600 hover:text-red-400 transition-colors text-lg leading-none px-1">
              ✕
            </button>
          </div>
          <input
            type="text"
            [value]="item.notes ?? ''"
            (input)="updateInstrument($index, 'notes', $any($event.target).value)"
            placeholder="Notes (optional)"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-emerald-600" />
        </div>
      }
    </section>

    <!-- Notes -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Notes</h2>
      <textarea
        [value]="set().notes ?? ''"
        (input)="updateNotes($any($event.target).value)"
        placeholder="Any general notes about this set..."
        rows="3"
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-600 resize-none">
      </textarea>
    </section>

    <div class="pb-10"></div>

  </main>
</div>
