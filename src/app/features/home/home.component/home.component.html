<div class="bg-gray-950 text-white">

  <header class="bg-gray-900 border-b border-gray-800 px-4 py-5 flex items-start justify-between">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">
        @if (authService.displayName()) {
          Welcome, {{ authService.displayName() }}
        } @else {
          OR Tech
        }
      </h1>
      <p class="text-sm text-gray-400 mt-0.5">What do you need?</p>
    </div>
    <button
      (click)="goToProfile()"
      class="w-9 h-9 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors mt-0.5"
      title="Profile">
      <i class="ti ti-user text-gray-400 text-base" aria-hidden="true"></i>
    </button>
  </header>

  <main class="px-4 py-6 max-w-2xl mx-auto space-y-4">

    <!-- Preference Cards -->
    <button
      (click)="goToPreferenceCards()"
      class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-left hover:border-blue-700 hover:bg-gray-800 transition-colors active:scale-[0.99] group">
      <div class="w-12 h-12 rounded-xl bg-blue-900/50 flex items-center justify-center mb-4">
        <i class="ti ti-clipboard-list text-2xl text-blue-400" aria-hidden="true"></i>
      </div>
      <p class="text-lg font-semibold text-white">Preference Cards</p>
      <p class="text-sm text-gray-400 mt-1">Surgeon preferences by specialty — instruments, sutures, setup, and tech notes.</p>
      <p class="text-xs text-blue-500 mt-3 group-hover:text-blue-400 transition-colors">Browse specialties →</p>
    </button>

    <!-- Instrument Sets -->
    <button
      (click)="goToInstrumentSets()"
      class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-left hover:border-gray-600 hover:bg-gray-800 transition-colors active:scale-[0.99] group opacity-75">
      <div class="w-12 h-12 rounded-xl bg-gray-800 flex items-center justify-center mb-4">
        <i class="ti ti-tools text-2xl text-gray-500" aria-hidden="true"></i>
      </div>
      <p class="text-lg font-semibold text-white">Instrument Sets</p>
      <p class="text-sm text-gray-400 mt-1">Standard and specialty instrument trays — counts, configurations, and sterilization notes.</p>
      <p class="text-xs text-gray-600 mt-3">Coming soon</p>
    </button>

    <button
      (click)="signOut()"
      class="w-full text-sm text-gray-600 hover:text-red-400 py-3 transition-colors">
      Sign out
    </button>

  </main>

</div>
