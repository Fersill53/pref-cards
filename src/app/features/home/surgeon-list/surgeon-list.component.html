<div class="bg-gray-950 text-white">

  <header class="sticky top-0 z-10 bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between">
    <button (click)="goBack()" class="text-gray-400 hover:text-white text-sm transition-colors">
      ← Back
    </button>
    <h1 class="text-base font-semibold">{{ specialtyName() }}</h1>
    <button (click)="showAddSurgeon.set(true)"
      class="text-sm text-blue-400 hover:text-blue-300 border border-blue-800 hover:border-blue-600 px-3 py-1.5 rounded-lg transition-colors">
      + Surgeon
    </button>
  </header>

  <main class="px-4 py-4 max-w-2xl mx-auto">

    @if (cardService.loading()) {
      <div class="flex items-center justify-center py-20 text-gray-400 text-sm">Loading...</div>
    }

    @if (!cardService.loading() && cardService.surgeons().length === 0) {
      <div class="flex flex-col items-center justify-center py-20 text-center">
        <p class="text-gray-400 text-sm">No surgeons yet.</p>
        <button (click)="showAddSurgeon.set(true)"
          class="mt-4 text-blue-400 hover:text-blue-300 text-sm underline">
          Add your first surgeon
        </button>
      </div>
    }

    @for (surgeon of cardService.surgeons(); track surgeon.id) {
      <div
        (click)="goToCards(surgeon)"
        class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-4 mb-3 cursor-pointer hover:border-gray-600 transition-colors active:scale-[0.99]">
        <p class="font-medium text-white">{{ surgeon.name }}</p>
      </div>
    }

  </main>

</div>

<!-- Add surgeon sheet -->
@if (showAddSurgeon()) {
  <div class="fixed inset-0 bg-black/60 z-40" (click)="showAddSurgeon.set(false)"></div>
  <div class="fixed bottom-0 left-0 right-0 z-50 bg-gray-900 border-t border-gray-700 rounded-t-2xl p-5 space-y-4">
    <div class="flex items-center justify-between">
      <h3 class="font-semibold text-white">Add Surgeon</h3>
      <button (click)="showAddSurgeon.set(false)" class="text-gray-400 hover:text-white text-xl leading-none">✕</button>
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Surgeon Name</label>
      <input type="text"
        [ngModel]="newSurgeonName()"
        (ngModelChange)="newSurgeonName.set($event)"
        placeholder="Dr. Smith"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500" />
    </div>
    <button (click)="addSurgeon()" [disabled]="saving() || !newSurgeonName().trim()"
      class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white font-medium py-2.5 rounded-lg transition-colors">
      {{ saving() ? 'Saving...' : 'Add Surgeon' }}
    </button>
  </div>
}
